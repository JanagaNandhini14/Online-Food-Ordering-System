<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Food Ordering System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>🍔 Online Food Ordering System</h1>
      <p>Browse menu, add items to cart, and place your order</p>
      <a class="top-link" href="{{ url_for('view_orders') }}">View Order History</a>
    </header>

    <main class="layout">
      <section class="menu-section card">
        <h2>Menu</h2>
        <div class="menu-grid">
          {% for item in menu_items %}
          <div class="menu-card">
            <h3>{{ item.name }}</h3>
            <p class="category">{{ item.category }}</p>
            <p class="desc">{{ item.description }}</p>
            <p class="price">₹{{ item.price }}</p>
            <button onclick="addToCart({{ item.id }}, '{{ item.name }}', {{ item.price }})">Add to Cart</button>
          </div>
          {% endfor %}
        </div>
      </section>

      <aside class="cart-section card">
        <h2>Cart</h2>
        <div id="cartItems">
          <p class="empty">No items added yet.</p>
        </div>

        <div class="cart-total">
          <strong>Total: ₹<span id="totalAmount">0</span></strong>
        </div>

        <div class="customer-form">
          <h3>Customer Details</h3>
          <input type="text" id="customerName" placeholder="Enter your name">
          <input type="text" id="customerPhone" placeholder="Enter phone number">
          <textarea id="customerAddress" placeholder="Enter delivery address"></textarea>
          <button class="place-btn" onclick="placeOrder()">Place Order</button>
        </div>
      </aside>
    </main>
  </div>

  <script>
    let cart = [];

    function addToCart(id, name, price) {
      const existingItem = cart.find(item => item.id === id);

      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        cart.push({ id, name, price, quantity: 1 });
      }

      renderCart();
    }

    function increaseQty(id) {
      const item = cart.find(item => item.id === id);
      if (item) {
        item.quantity += 1;
        renderCart();
      }
    }

    function decreaseQty(id) {
      const item = cart.find(item => item.id === id);
      if (item) {
        item.quantity -= 1;
        if (item.quantity <= 0) {
          cart = cart.filter(cartItem => cartItem.id !== id);
        }
        renderCart();
      }
    }

    function removeItem(id) {
      cart = cart.filter(item => item.id !== id);
      renderCart();
    }

    function renderCart() {
      const cartItemsDiv = document.getElementById("cartItems");
      const totalAmountSpan = document.getElementById("totalAmount");

      if (cart.length === 0) {
        cartItemsDiv.innerHTML = '<p class="empty">No items added yet.</p>';
        totalAmountSpan.innerText = '0';
        return;
      }

      let total = 0;
      cartItemsDiv.innerHTML = '';

      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;

        const itemDiv = document.createElement("div");
        itemDiv.className = "cart-item";
        itemDiv.innerHTML = `
          <div>
            <h4>${item.name}</h4>
            <p>₹${item.price} x ${item.quantity} = ₹${subtotal}</p>
          </div>
          <div class="qty-controls">
            <button onclick="decreaseQty(${item.id})">-</button>
            <span>${item.quantity}</span>
            <button onclick="increaseQty(${item.id})">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
        `;
        cartItemsDiv.appendChild(itemDiv);
      });

      totalAmountSpan.innerText = total;
    }

    async function placeOrder() {
      const customerName = document.getElementById("customerName").value.trim();
      const customerPhone = document.getElementById("customerPhone").value.trim();
      const customerAddress = document.getElementById("customerAddress").value.trim();

      if (!customerName || !customerPhone || !customerAddress) {
        alert("Please fill all customer details.");
        return;
      }

      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }

      try {
        const response = await fetch("/place_order", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            customer_name: customerName,
            phone: customerPhone,
            address: customerAddress,
            cart: cart
          })
        });

        const data = await response.json();

        if (data.success) {
          alert(`Order placed successfully. Order ID: ${data.order_id}`);
          cart = [];
          renderCart();

          document.getElementById("customerName").value = "";
          document.getElementById("customerPhone").value = "";
          document.getElementById("customerAddress").value = "";
        } else {
          alert(data.message);
        }
      } catch (error) {
        alert("Something went wrong while placing the order.");
      }
    }
  </script>
</body>
</html>
